# Training config for the toy (pseudo-experiment) pipeline.
#
# Usage:
#   python scripts/run_train.py --config configs/train_toy.yaml
#   python scripts/run_train.py --config configs/train_toy.yaml --mode train

dataset: toy
data_dir: data/toy_scale_easy
mu: 1.0

seed: null

# Data splitting
test_prefixes: null
n_test_experiments: 1000
valid_size: 0.2
calib_size: 0.5

# Model / inference
model:
  name: mlp                  # "mlp" (default), "glm", or "random_forest"
  params:
    hidden_layer_sizes: [2]
    activation: relu
    max_iter: 2

threshold: 0.5

# Legacy fields (kept for backward compat with scripts/train.py)
nonconf_target: mu_hat     # "mu_hat" or "n_pred"
nonconf_method: diff        # "diff" or "abs"

# Output
output_dir: results

# --- Phase 2: Calibration ---
calibration:
  target: mu_hat        # "mu_hat" for signal strength, "n_pred" for event count
  how: diff             # "diff" or "abs"
  alpha: 0.3173         # significance level (~1-sigma)
  ci_type: asymmetric   # "asymmetric" or "central"
  enabled: true
  save_artifacts: true

# --- Phase 2: Evaluation ---
evaluation:
  metrics: [loss, accuracy, precision, recall, f1, pr_auc, roc_auc]
  enabled: true
  save_artifacts: true
  ci_score_lambda: 1.0
  ci_score_epsilon: 1.0e-6

# --- Phase 3: Tracking ---
tracking:
  enabled: true
  wandb_enabled: false
  wandb_project: "higgsML-uncertainty"

# --- Phase 4: Reporting ---
reporting:
  generate_plots: true   # set to false to skip plot generation
  figure_dpi: 150        # PNG resolution (dots per inch)
  index_path: "results/runs_index.json"
